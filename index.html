<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Alarm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Manrope:wght@200;300;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="app">
    <header class="head">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">ALARM</span>
      </div>
      <div class="date" id="date"></div>
    </header>

    <section class="clock-card">
      <div class="clock" id="clock">--:--<span class="sec" id="sec">00</span></div>
      <div class="meridian" id="meridian">—</div>
    </section>

    <section class="setter-card">
      <h2 class="section-title">新しいアラーム</h2>
      <form class="setter" id="setter">
        <label class="time-field">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 2"/>
          </svg>
          <input type="time" id="time-input" required />
        </label>
        <button type="submit" id="set-btn">
          <span>セット</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </form>
    </section>

    <section class="list-card">
      <h2 class="section-title">
        <span>セット中</span>
        <span class="count" id="count">0</span>
      </h2>
      <ul class="alarms" id="alarms"></ul>
      <p class="empty" id="empty">まだアラームはセットされていません</p>
    </section>

    <footer class="foot">made with care · simple-alarm</footer>
  </main>

  <div class="ringing" id="ringing" hidden>
    <div class="ring-glow"></div>
    <div class="ring-content">
      <div class="ring-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 8a6 6 0 1 1 12 0c0 7 3 8 3 8H3s3-1 3-8"/>
          <path d="M10 21a2 2 0 0 0 4 0"/>
        </svg>
      </div>
      <p class="ring-title">時間です</p>
      <p class="ring-time" id="ring-time">--:--</p>
      <button type="button" id="stop-btn">止める</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
